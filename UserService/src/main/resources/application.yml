jwt:
  secret: ${SECRET}
  lifetime: 300m

app:
  base-url-auth: http://localhost:8189
  work-start: "09:00"
  work-end: "18:00"

spring:
  application:
    name: meeting-site
  jackson:
    time-zone: UTC
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        enable_lazy_load_no_trans: true
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8189

springdoc:
  swagger-ui:
    path: /swagger-ui